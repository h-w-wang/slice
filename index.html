<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圓形裁切與零白邊去背</title>
<style>
    body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; color: #333; padding: 20px; }
    .container { background: white; padding: 25px; border-radius: 12px; max-width: 680px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    
    canvas { max-width: 100%; border: 2px dashed #ccc; border-radius: 50%; cursor: crosshair; transition: background 0.3s; margin-bottom: 15px; }
    .bg-checker { background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; }
    .bg-black { background-color: #000000; }
    .bg-green { background-color: #00ff00; }
    .bg-white { background-color: #ffffff; }

    .control-panel { text-align: left; background: #fdfdfd; padding: 15px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 15px; }
    .control-panel strong { display: block; margin-bottom: 10px; color: #0056b3; }
    label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
    input[type="range"] { width: 100%; margin-bottom: 10px; }
    input[type="file"] { margin-bottom: 20px; font-size: 16px; }

    button { background-color: #6c757d; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; margin: 3px; transition: 0.2s; }
    button:hover { filter: brightness(0.9); }
    .btn-bg { background-color: #e9ecef; color: #333; border: 1px solid #ccc; }
    .btn-bg:hover { background-color: #d3d9df; }
    .btn-reset { background-color: #ffc107; color: #000; }
    .btn-smooth { background-color: #17a2b8; color: white; font-weight: bold; padding: 10px; }
    .btn-smooth-pro { background-color: #dc3545; color: white; font-weight: bold; padding: 10px; }
    .btn-download { background-color: #28a745; font-size: 18px; padding: 12px; width: 100%; margin-top: 10px; }
    
    .tool-group { background: #eef5ff; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #cce5ff; }
    .radio-group { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
    .radio-group label { cursor: pointer; font-weight: normal; font-size: 15px; }
</style>
</head>
<body>

<div class="container">
    <h2>圓形裁切與零白邊去背</h2>
    <input type="file" id="upload" accept="image/*">

    <canvas id="backup-canvas" style="display: none;"></canvas>

    <div>
        <canvas id="canvas" class="bg-checker"></canvas>
    </div>

    <div class="control-panel">
        <strong>👁️ 1. 檢查底色 (強烈建議切換到純黑底檢查白邊)</strong>
        <button class="btn-bg" onclick="setCanvasBg('bg-checker')">🏁 透明網格</button>
        <button class="btn-bg" onclick="setCanvasBg('bg-black')">⚫ 純黑底</button>
        <button class="btn-bg" onclick="setCanvasBg('bg-green')">🟢 綠幕底</button>
        <button class="btn-bg" onclick="setCanvasBg('bg-white')">⚪ 純白底</button>
    </div>

    <div class="control-panel" id="crop-panel">
        <strong>✂️ 2. 調整圓形範圍 (注意：調整此處會重置去背進度)</strong>
        <label>🔴 半徑 (<span id="r-val">200</span>px)</label>
        <input type="range" id="radius" min="50" max="800" value="200">
        <label>↔️ 左右移動</label>
        <input type="range" id="offset-x" min="-500" max="500" value="0">
        <label>↕️ 上下移動</label>
        <input type="range" id="offset-y" min="-500" max="500" value="0">
    </div>

    <div class="control-panel">
        <strong>🖌️ 3. 手動與自動去背工具</strong>
        <div class="tool-group">
            <div class="radio-group">
                <label><input type="radio" name="tool" value="magic" checked> ✨ 魔術棒 (點擊自動去背)</label>
                <label><input type="radio" name="tool" value="erase"> 🧽 橡皮擦 (手動擦除)</label>
                <label><input type="radio" name="tool" value="restore"> 🩹 復原畫筆 (救回不小心擦掉的)</label>
            </div>

            <div id="magic-settings">
                <label>魔術棒容差值：<span id="tol-val">40</span></label>
                <input type="range" id="tolerance" min="0" max="150" value="40">
            </div>

            <div id="brush-settings" style="display: none;">
                <label>筆刷大小：<span id="brush-val">20</span>px</label>
                <input type="range" id="brush-size" min="5" max="150" value="20">
            </div>
        </div>
        
        <div class="tool-group" style="background: #fff3cd; border-color: #ffeeba;">
            <strong>✨ 4. 終極除白邊與平滑 (去背完最後使用)</strong>
            <p style="font-size:13px; margin-top:0; color: #856404;">覺得邊緣狗牙或有白邊嗎？點擊下方按鈕，程式會自動把邊緣「往內切掉」並羽化！</p>
            <button class="btn-smooth" onclick="applyAdvancedSmooth(0, 2)">💧 僅輕度平滑</button>
            <button class="btn-smooth-pro" onclick="applyAdvancedSmooth(1, 2)">🔥 強效除白邊 (內縮1px+平滑)</button>
            <button class="btn-smooth-pro" onclick="applyAdvancedSmooth(2, 3)">🌋 極限除白邊 (內縮2px+平滑)</button>
        </div>
        
        <button class="btn-reset" onclick="resetCrop()" style="margin-top: 10px;">🔄 重置：恢復到剛裁切完的狀態</button>
    </div>

    <a id="download-link" download="avatar_ultimate_transparent.png">
        <button class="btn-download">⬇️ 下載完美去背圖片</button>
    </a>
</div>

<script>
    const upload = document.getElementById('upload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    const backupCanvas = document.getElementById('backup-canvas');
    const backupCtx = backupCanvas.getContext('2d', { willReadFrequently: true });
    
    let originalImage = null;
    let isDrawing = false;

    // UI 控制項
    const radiusRange = document.getElementById('radius');
    const oxRange = document.getElementById('offset-x');
    const oyRange = document.getElementById('offset-y');
    const tolRange = document.getElementById('tolerance');
    const brushRange = document.getElementById('brush-size');
    const downloadLink = document.getElementById('download-link');
    const toolRadios = document.getElementsByName('tool');

    // 工具切換顯示邏輯
    toolRadios.forEach(radio => {
        radio.addEventListener('change', (e) => {
            if (e.target.value === 'magic') {
                document.getElementById('magic-settings').style.display = 'block';
                document.getElementById('brush-settings').style.display = 'none';
            } else {
                document.getElementById('magic-settings').style.display = 'none';
                document.getElementById('brush-settings').style.display = 'block';
            }
        });
    });

    function setCanvasBg(bgClass) { canvas.className = bgClass; }

    radiusRange.addEventListener('input', e => document.getElementById('r-val').innerText = e.target.value);
    tolRange.addEventListener('input', e => document.getElementById('tol-val').innerText = e.target.value);
    brushRange.addEventListener('input', e => document.getElementById('brush-val').innerText = e.target.value);

    upload.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.onload = () => {
            originalImage = img;
            const minEdge = Math.min(img.width, img.height);
            radiusRange.max = minEdge; radiusRange.value = minEdge / 2;
            document.getElementById('r-val').innerText = radiusRange.value;
            oxRange.min = -img.width; oxRange.max = img.width; oxRange.value = 0;
            oyRange.min = -img.height; oyRange.max = img.height; oyRange.value = 0;
            drawCrop();
        };
        img.src = URL.createObjectURL(file);
    });

    [radiusRange, oxRange, oyRange].forEach(el => el.addEventListener('change', drawCrop)); // 改用 change 避免拖曳時瘋狂重繪導致卡頓

    function drawCrop() {
        if (!originalImage) return;
        const r = parseInt(radiusRange.value);
        const ox = parseInt(oxRange.value);
        const oy = parseInt(oyRange.value);

        canvas.width = r * 2; canvas.height = r * 2;
        backupCanvas.width = r * 2; backupCanvas.height = r * 2;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        backupCtx.clearRect(0, 0, backupCanvas.width, backupCanvas.height);
        
        // 畫出圓形遮罩
        ctx.beginPath(); ctx.arc(r, r, r, 0, Math.PI * 2); ctx.closePath(); ctx.clip();
        backupCtx.beginPath(); backupCtx.arc(r, r, r, 0, Math.PI * 2); backupCtx.closePath(); backupCtx.clip();

        const startX = (originalImage.width - r * 2) / 2 - ox;
        const startY = (originalImage.height - r * 2) / 2 - oy;
        
        // 畫入主畫布與備份畫布
        ctx.drawImage(originalImage, startX, startY, r * 2, r * 2, 0, 0, r * 2, r * 2);
        backupCtx.drawImage(originalImage, startX, startY, r * 2, r * 2, 0, 0, r * 2, r * 2);
        
        updateDownload();
    }

    function resetCrop() {
        if (!originalImage) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(backupCanvas, 0, 0); // 從備份畫布還原
        updateDownload();
    }

    // --- 繪圖事件處理 (滑鼠 & 觸控) ---
    function getMousePos(evt) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX = evt.clientX || (evt.touches && evt.touches[0].clientX);
        let clientY = evt.clientY || (evt.touches && evt.touches[0].clientY);
        return { 
            x: Math.floor((clientX - rect.left) * scaleX), 
            y: Math.floor((clientY - rect.top) * scaleY) 
        };
    }

    function handleInteraction(e, isClick) {
        if (!originalImage) return;
        
        let currentTool = document.querySelector('input[name="tool"]:checked').value;
        const pos = getMousePos(e);

        if (currentTool === 'magic' && isClick) {
            applyMagicWand(pos.x, pos.y);
        } else if ((currentTool === 'erase' || currentTool === 'restore') && (isDrawing || isClick)) {
            const brushSize = parseInt(brushRange.value);
            
            if (currentTool === 'erase') {
                ctx.globalCompositeOperation = 'destination-out'; // 橡皮擦模式
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, brushSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
            } else if (currentTool === 'restore') {
                // 從備份畫布把原圖畫回來
                ctx.save();
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, brushSize, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(backupCanvas, 0, 0);
                ctx.restore();
            }
            updateDownload();
        }
    }

    canvas.addEventListener('mousedown', e => { isDrawing = true; handleInteraction(e, true); });
    canvas.addEventListener('mousemove', e => { if (isDrawing) handleInteraction(e, false); });
    window.addEventListener('mouseup', () => isDrawing = false);

    canvas.addEventListener('touchstart', e => { isDrawing = true; handleInteraction(e, true); e.preventDefault(); }, {passive: false});
    canvas.addEventListener('touchmove', e => { if (isDrawing) handleInteraction(e, false); e.preventDefault(); }, {passive: false});
    window.addEventListener('touchend', () => isDrawing = false);

    // --- 魔術棒演算法 ---
    function applyMagicWand(startX, startY) {
        const tolerance = parseInt(tolRange.value);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        const width = canvas.width; const height = canvas.height;

        const startPos = (startY * width + startX) * 4;
        const startR = data[startPos], startG = data[startPos + 1], startB = data[startPos + 2], startA = data[startPos + 3];
        if (startA === 0) return; 

        const stack = [startX, startY];
        const seen = new Uint8Array(width * height);
        seen[startY * width + startX] = 1;
        const tolSq = tolerance * tolerance * 3;

        while (stack.length > 0) {
            const y = stack.pop(); const x = stack.pop();
            const pos = (y * width + x) * 4;
            data[pos + 3] = 0; 

            const neighbors = [[x+1, y], [x-1, y], [x, y+1], [x, y-1]];
            for (let i=0; i<4; i++) {
                const nx = neighbors[i][0]; const ny = neighbors[i][1];
                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                    const idx = ny * width + nx;
                    if (seen[idx] === 0) {
                        seen[idx] = 1;
                        const nPos = idx * 4;
                        if (data[nPos + 3] > 0) {
                            const r = data[nPos], g = data[nPos + 1], b = data[nPos + 2];
                            const distSq = Math.pow(r - startR, 2) + Math.pow(g - startG, 2) + Math.pow(b - startB, 2);
                            if (distSq <= tolSq) stack.push(nx, ny);
                        }
                    }
                }
            }
        }
        ctx.putImageData(imgData, 0, 0);
        updateDownload();
    }

    // --- 🌟 終極殺手鐧：邊緣內縮 + 羽化演算法 ---
    function applyAdvancedSmooth(shrinkAmount, blurAmount) {
        if (!originalImage) return;
        let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let data = imgData.data;
        let width = canvas.width;
        let height = canvas.height;
        let tempData = new Uint8ClampedArray(data);

        // 1. 邊緣內縮 (Erosion)：切掉帶有白邊的最外層像素
        for (let s = 0; s < shrinkAmount; s++) {
            let currentAlpha = new Uint8ClampedArray(tempData); // 備份當前狀態
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    const idx = (y * width + x) * 4;
                    // 如果這個像素是實體的
                    if (currentAlpha[idx + 3] > 0) {
                        // 檢查它的上下左右，只要碰到透明像素，它就是邊緣
                        if (currentAlpha[((y-1)*width + x)*4 + 3] === 0 ||
                            currentAlpha[((y+1)*width + x)*4 + 3] === 0 ||
                            currentAlpha[(y*width + x - 1)*4 + 3] === 0 ||
                            currentAlpha[(y*width + x + 1)*4 + 3] === 0) {
                            tempData[idx + 3] = 0; // 把邊緣削掉變成透明
                        }
                    }
                }
            }
        }

        // 2. 羽化平滑 (Alpha Blur)：讓削掉的邊緣變柔和，貼合曲線
        for (let b = 0; b < blurAmount; b++) {
            let currentAlpha = new Uint8ClampedArray(tempData);
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    const idx = (y * width + x) * 4 + 3;
                    if (currentAlpha[idx] > 0 || tempData[idx] > 0) {
                        let alphaSum = 0;
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                alphaSum += currentAlpha[((y + dy) * width + (x + dx)) * 4 + 3];
                            }
                        }
                        tempData[idx] = alphaSum / 9;
                    }
                }
            }
        }

        // 將運算結果寫回畫布
        for (let i = 0; i < data.length; i++) data[i] = tempData[i];
        ctx.putImageData(imgData, 0, 0);
        updateDownload();
    }

    function updateDownload() {
        downloadLink.href = canvas.toDataURL('image/png');
    }
</script>

</body>
</html>
